<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando | Spotify DWH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="flex min-h-screen flex-col items-center justify-center p-6 text-center">
    
    <div id="loading" class="flex flex-col items-center gap-6">
        <i data-lucide="loader-2" class="w-16 h-16 text-[#1DB954] animate-spin"></i>
        <h2 class="text-2xl font-bold">Autenticando...</h2>
        <p class="text-gray-400">Estamos validando tu sesión con Spotify.</p>
    </div>

    <div id="error" class="hidden flex flex-col items-center gap-6">
        <i data-lucide="x-circle" class="w-16 h-16 text-red-500"></i>
        <h2 class="text-2xl font-bold text-red-500">Error de Conexión</h2>
        <p id="errorMsg" class="text-gray-400 max-w-sm"></p>
        <a href="index.html" class="bg-[#1DB954] text-black font-bold py-3 px-8 rounded-full">VOLVER</a>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        lucide.createIcons();

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const accessToken = params.get('access_token');
            
            // Si el backend ya nos mandó el token directamente
            if (accessToken) {
                localStorage.setItem('spotify_dwh_token', accessToken);
                window.location.href = 'dashboard.html';
                return;
            }

            const code = params.get('code');
            const state = params.get('state');

            if (!code || !state) {
                showError('Faltan parámetros en el callback.');
                return;
            }

            try {
                const response = await spotifyApi.callback(code, state);
                localStorage.setItem('spotify_dwh_token', response.access_token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError('No se pudo completar el intercambio de tokens.');
            }
        }

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMsg').innerText = msg;
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>
